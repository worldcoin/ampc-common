[graph]
# Cargo deny will check dependencies via `--all-features`
all-features = true

[advisories]
version = 2
ignore = [
    { id = "RUSTSEC-2021-0137", reason = "we will switch to alkali eventually" },
    { id = "RUSTSEC-2024-0436", reason = "deep subdependency from several aws and sqlx crates" },
    # bincode maintainers consider 1.3.3 complete; used for serialization in ampc-anon-stats
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is considered complete by maintainers" },
    # rand 0.8.5 unsoundness only affects custom loggers using rand::rng() during reseed
    { id = "RUSTSEC-2026-0097", reason = "transitive dep from sqlx/nalgebra/statrs; we don't use custom loggers calling rand::rng()" },
    # quick-xml 0.26.0 XML-parse DoS (RUSTSEC-2026-0194 quadratic attribute check, RUSTSEC-2026-0195
    # NsReader namespace-alloc). Both patched only in quick-xml >= 0.41.0. Bump is infeasible: quick-xml
    # is reached solely via pprof 0.15 -> inferno ^0.11 (flamegraph feature in ampc-server-utils), and
    # every pprof release pins inferno ^0.11, which pins quick-xml ^0.26 -- no version in the tree can
    # reach >= 0.41.0. Not exploitable here: inferno only uses quick-xml to GENERATE flamegraph SVGs
    # (write path) from the server's own profiling data on the feature-gated debug /pprof/flame endpoint;
    # no untrusted XML is parsed via the vulnerable Attributes/NsReader read paths.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml XML-parse DoS; unreachable via pprof flamegraph SVG generation, and unbumpable (pprof pins inferno ^0.11 -> quick-xml ^0.26; patched >= 0.41.0)" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml NsReader namespace-alloc DoS; unreachable via pprof flamegraph SVG generation, and unbumpable (pprof pins inferno ^0.11 -> quick-xml ^0.26; patched >= 0.41.0)" },
]

[sources]
unknown-registry = "deny"

[licenses]
version = 2
# We want really high confidence when inferring licenses from text
confidence-threshold = 1.0

# List of explicitly allowed licenses
# See https://spdx.org/licenses/ for list of possible licenses
allow = [
    "0BSD",
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-2-Clause-Patent",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "LicenseRef-ring",
    "MIT",
    "MPL-2.0", # Although this is copyleft, it is scoped to modifying the original files
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "CDDL-1.0",
    "CDLA-Permissive-2.0"
]

# See https://github.com/briansmith/ring/blob/95948b3977013aed16db92ae32e6b8384496a740/deny.toml#L12
[[licenses.clarify]]
name = "ring"
expression = "LicenseRef-ring"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]
